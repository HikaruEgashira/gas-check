name: Release
on:
  push:
    tags: ["v*"]
permissions: {}
jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    timeout-minutes: 5
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        timeout-minutes: 5
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        timeout-minutes: 5
        with:
          targets: ${{ matrix.target }}
      - timeout-minutes: 5
        run: cargo build --release --target ${{ matrix.target }} -p gas-check
      - name: Package
        timeout-minutes: 5
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../gas-check-${{ matrix.target }}.tar.gz gas-check
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        timeout-minutes: 5
        with:
          name: gas-check-${{ matrix.target }}
          path: gas-check-${{ matrix.target }}.tar.gz
  release:
    needs: build
    permissions:
      contents: write
    timeout-minutes: 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        timeout-minutes: 5
      - uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        timeout-minutes: 5
        with:
          files: "**/*.tar.gz"
